name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # ÖNEMLİ: Çalışma dizinini babaplayer klasörüne ayarla
      - name: Set working directory
        run: cd babaplayer
        
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          
      - name: Install dependencies
        run: |
          cd babaplayer
          flutter pub get
        
      - name: Build APK
        run: |
          cd babaplayer
          flutter build apk --split-per-abi
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: babaplayer-apk
          path: babaplayer/build/app/outputs/flutter-apk/*.apk
